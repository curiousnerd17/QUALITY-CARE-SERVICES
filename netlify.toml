[build]
  publish = "."

# ── HTTP → HTTPS + www → non-www ──────────────────────────────────────────────

[[redirects]]
  from = "http://qualitycareservices.in/*"
  to   = "https://qualitycareservices.in/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.qualitycareservices.in/*"
  to   = "https://qualitycareservices.in/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.qualitycareservices.in/*"
  to   = "https://qualitycareservices.in/:splat"
  status = 301
  force  = true

# ── Publish restriction: repository documentation is never public (P0-4) ──────
# publish = "." deploys the repo root, so internal docs would otherwise be
# served (confirmed live before this change). Netlify redirects cannot match
# by extension (*.md is not a valid pattern), so each doc is blocked
# explicitly with a forced 404 (serves the custom 404 page).
# CONVENTION: any NEW repository-root documentation file MUST get a rule here
# in the same commit that creates it. This is a fail-open blocklist; the
# fail-closed alternative (a dedicated publish subdirectory) is a deliberate
# architecture decision deferred to the owner (see IMPLEMENTATION_MASTER_PLAN.md).
# netlify.toml itself is never served by Netlify (verified) and needs no rule.

[[redirects]]
  from = "/PROJECT.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/BACKLOG.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/CHANGELOG.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/SERVICE_PAGE_SPEC.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/IMPLEMENTATION_MASTER_PLAN.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/IMPLEMENTATION_PROGRESS.md"
  to = "/404.html"
  status = 404
  force = true


[[redirects]]
  from = "/MONITORING.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/RUNBOOK.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/LOCAL_SEO_MASTER_PLAN.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/IMPLEMENTATION_READINESS_REPORT.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/SEO_EXECUTION_PLAYBOOK.md"
  to = "/404.html"
  status = 404
  force = true

# Pre-armed: DECISION_LOG.md does not exist yet (SEO_EXECUTION_PLAYBOOK.md
# Appendix E row 2). The rule is added BEFORE the file so the blocklist cannot
# lag the document — inverting the fail-open ordering that produced B5. A rule
# for a non-existent path is inert: the path already 404s, and force=true
# changes nothing until the file appears.
[[redirects]]
  from = "/DECISION_LOG.md"
  to = "/404.html"
  status = 404
  force = true

# ── Directory-level protection: repository-only trees (B5 follow-up) ──────────
# The per-file rules above are FAIL-OPEN — a new root document is public until
# somebody remembers to add a rule, which is precisely how B5 arose and then
# widened. Directories do not have that weakness: Netlify supports splats in
# `from`, so a single rule covers every file in the tree, now and in future.
# Any evidence artifact added later is therefore protected on creation with no
# further action required — fail-CLOSED for everything under this path.
# (Extensions still cannot be matched this way: `*.md` is not a valid pattern.
# That limitation is why root documents remain individually enumerated above.)
#
# evidence/ holds deployment and verification records per
# SEO_EXECUTION_PLAYBOOK.md §13 — screenshots, validator output, before/after
# state. Repository-only, never served.
[[redirects]]
  from = "/evidence/*"
  to = "/404.html"
  status = 404
  force = true


# ── Security headers (all pages) ──────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # Enforce HTTPS for 2 years across all subdomains
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

    # Block clickjacking — this page should never be framed by another site
    X-Frame-Options = "DENY"

    # Stop MIME-type sniffing exploits
    X-Content-Type-Options = "nosniff"

    # Control referrer leakage
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable sensitive browser features not used by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Content Security Policy
    # unsafe-inline required for: GA4 init snippet, footer copyright IIFE, JSON-LD (type=application/ld+json is exempt but included for clarity)
    # Update G-XXXXXXXXXX to your real GA4 Measurement ID before enabling GA4
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com https://script.google.com https://script.googleusercontent.com https://www.google-analytics.com; frame-src https://www.google.com; object-src 'none'; base-uri 'self';"

    # Remove the "X-Powered-By" fingerprint Netlify sometimes injects
    X-Powered-By = ""

# ── Cache: versioned assets (CSS / JS) — 1 year, immutable ───────────────────

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: images — 30 days ───────────────────────────────────────────────────

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ── Cache: HTML — always revalidate ──────────────────────────────────────────

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: sitemap + robots — 1 day ──────────────────────────────────────────

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Cache: manifest + browserconfig ──────────────────────────────────────────

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/browserconfig.xml"
  [headers.values]
    Cache-Control = "public, max-age=604800"
